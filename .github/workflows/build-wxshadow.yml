name: Build wxshadow

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            make \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            file

      - name: Update KernelPatch submodule to 0.13.1
        run: |
          git -C .kp fetch --tags
          git -C .kp checkout v0.13.1 || git -C .kp checkout 0.13.1
          git -C .kp rev-parse --short HEAD

      - name: Patch kpatch version to 0.13.1
        run: |
          sed -i 's/#define KP_MAJOR .*/#define KP_MAJOR 0/' tools/kpatch/kpatch.c
          sed -i 's/#define KP_MINOR .*/#define KP_MINOR 13/' tools/kpatch/kpatch.c
          sed -i 's/#define KP_PATCH .*/#define KP_PATCH 1/' tools/kpatch/kpatch.c
          grep -n "KP_MAJOR\|KP_MINOR\|KP_PATCH" tools/kpatch/kpatch.c

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc

      - name: Build wxshadow
        run: |
          cmake --build build --target wxshadow.kpm -- -j"$(nproc)"
          cmake --build build --target wxshadow_client -- -j"$(nproc)"

      - name: Build official kpatch 0.13.1
        run: |
          git clone --depth 1 --branch 0.13.1 https://github.com/bmax121/KernelPatch.git KernelPatch || \
          git clone --depth 1 --branch v0.13.1 https://github.com/bmax121/KernelPatch.git KernelPatch

          find KernelPatch -maxdepth 4 -type f | grep -E "kpatch|supercall" || true

          aarch64-linux-gnu-gcc -static -O2 -s \
            KernelPatch/user_deprecated/kpatch.c \
            -IKernelPatch/user_deprecated \
            -o build/kpatch

      - name: Collect artifacts
        run: |
          mkdir -p out

          cp "$(find build -type f -name 'wxshadow.kpm' | head -n 1)" out/
          cp "$(find build -type f -name 'wxshadow_client' | head -n 1)" out/
          cp build/kpatch out/

          chmod +x out/kpatch out/wxshadow_client

          ls -lh out
          file out/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxshadow-arm64-kp-0.13.1
          path: out/*
