name: Build wxshadow

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            make \
            wget \
            xz-utils \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            file

      - name: Install aarch64-none-elf toolchain
        run: |
          set -eux

          TOOLCHAIN_URL="https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-elf.tar.xz"
          TOOLCHAIN_DIR="arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-elf"

          wget -q "$TOOLCHAIN_URL" -O toolchain.tar.xz
          tar -xf toolchain.tar.xz

          echo "$PWD/$TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"

          "$PWD/$TOOLCHAIN_DIR/bin/aarch64-none-elf-gcc" --version
          "$PWD/$TOOLCHAIN_DIR/bin/aarch64-none-elf-ld" --version

      - name: Update KernelPatch submodule to 0.13.1
        run: |
          set -eux

          git -C .kp fetch --tags || true

          git -C .kp checkout v0.13.1 || \
          git -C .kp checkout 0.13.1 || \
          true

          git -C .kp rev-parse --short HEAD

      - name: Configure wxshadow KPM
        run: |
          set -eux

          cmake -S . -B build-kpm \
            -DCMAKE_C_COMPILER=aarch64-none-elf-gcc

      - name: Build wxshadow KPM
        run: |
          set -eux

          cmake --build build-kpm --target wxshadow.kpm -- -j"$(nproc)"

      - name: Configure wxshadow client
        run: |
          set -eux

          cmake -S . -B build-client \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc

      - name: Build wxshadow client
        run: |
          set -eux

          cmake --build build-client --target wxshadow_client -- -j"$(nproc)"

      - name: Collect artifacts
        run: |
          set -eux

          mkdir -p out

          WXSHADOW_KPM="$(find build-kpm -type f -name 'wxshadow.kpm' | head -n 1)"
          WXSHADOW_CLIENT="$(find build-client -type f -name 'wxshadow_client' | head -n 1)"

          test -n "$WXSHADOW_KPM"
          test -n "$WXSHADOW_CLIENT"

          cp "$WXSHADOW_KPM" out/wxshadow.kpm
          cp "$WXSHADOW_CLIENT" out/wxshadow_client

          chmod 644 out/wxshadow.kpm
          chmod 755 out/wxshadow_client

          ls -lh out
          file out/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxshadow-arm64-kp-0.13.1
          path: out/*
