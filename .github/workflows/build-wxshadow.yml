name: Build wxshadow

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            make \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-none-elf \
            binutils-aarch64-none-elf \
            file

      - name: Update KernelPatch submodule to 0.13.1
        run: |
          git -C .kp fetch --tags
          git -C .kp checkout v0.13.1 || git -C .kp checkout 0.13.1
          git -C .kp rev-parse --short HEAD

      - name: Build wxshadow kpm with none-elf
        run: |
          cmake -S . -B build-kpm \
            -DCMAKE_C_COMPILER=aarch64-none-elf-gcc
          cmake --build build-kpm --target wxshadow.kpm -- -j"$(nproc)"

      - name: Build wxshadow client with linux-gnu
        run: |
          cmake -S . -B build-client \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
          cmake --build build-client --target wxshadow_client -- -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p out

          cp "$(find build-kpm -type f -name 'wxshadow.kpm' | head -n 1)" out/wxshadow.kpm
          cp "$(find build-client -type f -name 'wxshadow_client' | head -n 1)" out/wxshadow_client

          chmod +x out/wxshadow_client

          ls -lh out
          file out/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxshadow-arm64-kp-0.13.1
          path: out/*
